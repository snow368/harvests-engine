# bot_configs.yaml — Bot 农场全局配置
# 支持多台 VPS，每台 VPS 多个 Chrome 实例
# VPS 到手后只需要改 proxy 和 IG 账号信息

vps:
  # ========== VPS-1 (主服务器) ==========
  - host: "vps1.example.com"
    label: "香港-1"
    location: "Hong Kong"
    specs:
      cpu: 8
      ram_gb: 32
      storage_gb: 200
    bots:
      # bot_supply 系列 — 扒同行帖子 + 内容分析
      - id: bot_supply_01
        archetype: social_butterfly
        proxy: "socks5://user:pass@ip1:1080"
        ig_account: "supply_01@email.com"
        ig_username: "@supply_01"
        profile_dir: "bot_supply_01_chrome_data"
        viewport: "1536x864"
        timezone: "America/New_York"
        tasks: [supply_analysis]

      # bot_content 系列 — 发帖专用 (各号不同品类)
      - id: bot_content_01
        archetype: professional
        proxy: "socks5://user:pass@ip2:1080"
        ig_account: "content_01@email.com"
        ig_username: "@content_01"
        profile_dir: "bot_content_01_chrome_data"
        viewport: "1440x900"
        timezone: "America/New_York"
        tasks: [publish]
        content_focus: "cartridge"     # 主发 COG 产品

      - id: bot_content_02
        archetype: professional
        proxy: "socks5://user:pass@ip3:1080"
